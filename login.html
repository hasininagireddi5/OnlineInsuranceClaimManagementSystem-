<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Insurance Claim System - Login</title>

    <style>
        /* ====== STYLE.CSS ====== */

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(120deg, #2c3e50, #3498db);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: white;
            padding: 30px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #2c3e50;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #3498db;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background-color: #2980b9;
        }

        .error {
            color: red;
            font-size: 13px;
            margin-top: 8px;
        }

        .footer-text {
            margin-top: 15px;
            font-size: 12px;
            color: gray;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <h2>Insurance Claim System</h2>

        <select id="role">
            <option value="customer">Customer</option>
            <option value="admin">Admin</option>
            <option value="agent">Agent</option>
        </select>

        <input type="text" id="username" placeholder="Enter Username">

        <input type="password" id="password" placeholder="Enter Password">

        <button onclick="loginUser()">Login</button>

        <div class="error" id="errorMsg"></div>

        <div class="footer-text">
            Online Insurance Claim Management
        </div>
    </div>


<script>
/* ====== LOGIN.JS ====== */

function loginUser() {

    const role = document.getElementById("role").value;
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    const errorMsg = document.getElementById("errorMsg");

    // simple demo credentials
    const users = {
        customer: { user: "user", pass: "123" },
        admin: { user: "admin", pass: "admin" },
        agent: { user: "agent", pass: "123" }
    };

    if (username === "" || password === "") {
        errorMsg.textContent = "Please enter username and password";
        return;
    }

    if (
        username === users[role].user &&
        password === users[role].pass
    ) {
        errorMsg.style.color = "green";
        errorMsg.textContent = "Login Successful!";

        // redirect based on role
        setTimeout(() => {
            if(role === "admin"){
                window.location.href = "admin_dashboard.html";
            }
            else{
                window.location.href = "dashboard.html";
            }
        }, 1000);
    } else {
        errorMsg.style.color = "red";
        errorMsg.textContent = "Invalid login details";
    }
}
</script>

</body>
</html>
