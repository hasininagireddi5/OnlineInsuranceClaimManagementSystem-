<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#f4f6f9;
}

.header{
    background:#2c3e50;
    color:white;
    padding:15px;
    text-align:center;
    font-size:20px;
}

.nav{
    background:#34495e;
    padding:10px;
    display:flex;
    justify-content:center;
}

.nav button{
    background:white;
    border:none;
    padding:10px 15px;
    margin:5px;
    border-radius:5px;
    cursor:pointer;
    font-weight:bold;
}

.nav button:hover{
    background:#3498db;
    color:white;
}

.container{
    padding:20px;
    text-align:center;
}

.card{
    background:white;
    display:inline-block;
    width:220px;
    margin:15px;
    padding:20px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card h3{
    margin:10px 0;
    color:#2c3e50;
}

.logout{
    position:absolute;
    right:20px;
    top:15px;
    background:#e74c3c;
    color:white;
    border:none;
    padding:6px 12px;
    border-radius:5px;
    cursor:pointer;
}

.logout:hover{
    background:#c0392b;
}
</style>
</head>

<body>

<div class="header">
    Customer Dashboard
    <button class="logout" onclick="logout()">Logout</button>
</div>

<div class="nav">
    <button onclick="goPage('policies.html')">My Policies</button>
    <button onclick="goPage('claim.html')">Raise Claim</button>
    <button onclick="goPage('my-claims.html')">Claim Status</button>
    <button onclick="goPage('payment.html')">Payments</button>
    <button onclick="goPage('notifications.html')">Notifications</button>
</div>

<div class="container">

    <h2>Welcome to Insurance Claim System</h2>

    <div class="card">
        <h3>Active Policies</h3>
        <p id="policyCount">3</p>
    </div>

    <div class="card">
        <h3>Claims Submitted</h3>
        <p id="totalClaims">0</p>
    </div>

    <div class="card">
        <h3>Pending Approvals</h3>
        <p id="pendingClaims">0</p>
    </div>

</div>

<script>

function logout(){
    window.location.href="login.html";
}

function goPage(page){
    window.location.href = page;
}

/* ===== Dynamic Data ===== */

let claims = JSON.parse(localStorage.getItem("claims")) || [];

document.getElementById("totalClaims").innerHTML = claims.length;

let pending = claims.filter(c => c.status === "Pending").length;

document.getElementById("pendingClaims").innerHTML = pending;

</script>

</body>
</html>
