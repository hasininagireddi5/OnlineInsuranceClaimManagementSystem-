<!DOCTYPE html>
<html>
<head>
    <title>Raise Claim</title>

    <style>

        body{
            font-family: Arial;
            background:#f4f6f9;
            margin:0;
        }

        header{
            background:#2c3e50;
            color:white;
            padding:15px;
            text-align:center;
        }

        .container{
            width:40%;
            margin:30px auto;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        input, select, textarea{
            width:100%;
            padding:10px;
            margin:10px 0;
            border-radius:5px;
            border:1px solid #ccc;
        }

        button{
            width:100%;
            padding:12px;
            background:#27ae60;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#219150;
        }

        .msg{
            text-align:center;
            margin-top:15px;
            color:green;
            font-weight:bold;
        }

    </style>

</head>

<body>

<header>
    <h2>Raise Insurance Claim</h2>
</header>

<div class="container">

    <label>Select Policy</label>

    <select id="policy">
        <option value="">-- Select Policy --</option>
        <option value="Health Insurance">Health Insurance</option>
        <option value="Vehicle Insurance">Vehicle Insurance</option>
        <option value="Life Insurance">Life Insurance</option>
    </select>

    <label>Claim Amount</label>

    <input type="number" id="amount" placeholder="Enter claim amount">

    <label>Reason / Description</label>

    <textarea id="reason" rows="4" placeholder="Explain the issue"></textarea>

    <button onclick="submitClaim()">Submit Claim</button>

    <div class="msg" id="msg"></div>

</div>

<script>

function submitClaim(){

    let policy = document.getElementById("policy").value;
    let amount = document.getElementById("amount").value;
    let reason = document.getElementById("reason").value;

    if(policy === "" || amount === "" || reason === ""){
        alert("Please fill all details");
        return;
    }

    let claims = JSON.parse(localStorage.getItem("claims")) || [];

    let newClaim = {
        id: Date.now(),
        policy: policy,
        amount: amount,
        reason: reason,
        status: "Pending",
        date: new Date().toLocaleDateString()
    };

    claims.push(newClaim);

    localStorage.setItem("claims", JSON.stringify(claims));

    document.getElementById("msg").innerHTML =
    "✅ Claim submitted successfully! Redirecting to Claim Status...";

    setTimeout(function(){
        window.location.href = "my-claims.html";
    },1500);

}

</script>

</body>
</html>
