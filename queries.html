        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background-color: #f4f7f9; color: #333; }
        header { text-align: center; margin-bottom: 30px; }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 8px;
            max-width: 1000px;
            margin: 0 auto 30px auto;
        }

        button {
            padding: 10px;
            cursor: pointer;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover { background-color: #2ecc71; transform: scale(1.1); }

        .display-box {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        pre {
            background: #272822;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            border-left: 5px solid #3498db;
        }

        .table-container { margin-top: 20px; overflow-x: auto; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #fff; }
        table, th, td { border: 1px solid #ddd; }
        th { background-color: #3498db; color: white; padding: 12px; text-align: left; }
        td { padding: 10px; }
        tr:nth-child(even) { background-color: #f9f9f9; }

        .result-label { font-weight: bold; color: #2c3e50; text-transform: uppercase; font-size: 0.8rem; display: block; margin-top: 15px; }
        
        @media (max-width: 768px) {
            .grid-container { grid-template-columns: repeat(5, 1fr); }
        }
    </style>
</head>

  function generateTable(queryObj) {

    const output = document.getElementById('table-output');
    const tableName = queryObj.table;

    let data = [...mockData[tableName]];
    const sql = queryObj.sql.toLowerCase();

    // -------- CITY FILTER --------
    if (sql.includes("city = 'delhi'"))
        data = data.filter(d => d.City === "Delhi");

    if (sql.includes("city = 'mumbai'"))
        data = data.filter(d => d.City === "Mumbai");

    if (sql.includes("city = 'pune'"))
        data = data.filter(d => d.City === "Pune");

    // -------- NAME LIKE FILTER --------
    if (sql.includes("name like 'p%'"))
        data = data.filter(d => d.Name && d.Name.startsWith("P"));

    if (sql.includes("name like 'a%'"))
        data = data.filter(d => d.Name && d.Name.startsWith("A"));

    if (sql.includes("name like '%singh'"))
        data = data.filter(d => d.Name && d.Name.endsWith("Singh"));

    // -------- STATUS FILTER --------
    if (sql.includes("status = 'active'"))
        data = data.filter(d => d.Status === "Active");

    if (sql.includes("status = 'expired'"))
        data = data.filter(d => d.Status === "Expired");

    if (sql.includes("status = 'pending'"))
        data = data.filter(d => d.Status === "Pending");

    if (sql.includes("status = 'approved'"))
        data = data.filter(d => d.Status === "Approved");

    if (sql.includes("status = 'rejected'"))
        data = data.filter(d => d.Status === "Rejected");

    // -------- PREMIUM FILTER --------
    if (sql.includes("premium > 10000"))
        data = data.filter(d => d.Premium > 10000);

    if (sql.includes("premium < 6000"))
        data = data.filter(d => d.Premium < 6000);

    // -------- CLAIM AMOUNT --------
    if (sql.includes("amount > 20000"))
        data = data.filter(d => d.Amount > 20000);

    if (sql.includes("between 5000 and 20000"))
        data = data.filter(d => d.Amount >= 5000 && d.Amount <= 20000);

    // -------- PAYMENT METHOD --------
    if (sql.includes("method = 'upi'"))
        data = data.filter(d => d.Method === "UPI");

    if (sql.includes("method = 'card'"))
        data = data.filter(d => d.Method === "Card");

    // -------- POLICY ID FILTER --------
    if (sql.includes("policy_id = 101"))
        data = data.filter(d => d.Policy_ID === 101);

    if (sql.includes("policy_id = 102"))
        data = data.filter(d => d.Policy_ID === 102);

    // -------- CLAIM ID --------
    if (sql.includes("claim_id = 502"))
        data = data.filter(d => d.Claim_ID === 502);

    // -------- AGENT NAME --------
    if (sql.includes("name = 'suresh'"))
        data = data.filter(d => d.Name === "Suresh");

    // -------- COUNT --------
    if (sql.includes("count(")) {
        output.innerHTML = `<p><b>Total Count:</b> ${data.length}</p>`;
        return;
    }

    // -------- SUM --------
    if (sql.includes("sum(")) {

        let field = "";

        if (sql.includes("premium")) field = "Premium";
        if (sql.includes("amount")) field = "Amount";
        if (sql.includes("target")) field = "Target";

        let sum = data.reduce((s, r) => s + (r[field] || 0), 0);

        output.innerHTML = `<p><b>SUM Result:</b> ${sum}</p>`;
        return;
    }

    // -------- AVG --------
    if (sql.includes("avg(")) {

        let field = "";

        if (sql.includes("premium")) field = "Premium";
        if (sql.includes("amount")) field = "Amount";
        if (sql.includes("target")) field = "Target";

        let sum = data.reduce((s, r) => s + (r[field] || 0), 0);
        let avg = sum / data.length;

        output.innerHTML = `<p><b>Average Result:</b> ${avg.toFixed(2)}</p>`;
        return;
    }

    // -------- MIN --------
    if (sql.includes("min(")) {

        let field = sql.includes("amount") ? "Amount" : "Target";

        let min = Math.min(...data.map(d => d[field]));

        output.innerHTML = `<p><b>Minimum Value:</b> ${min}</p>`;
        return;
    }

    // -------- MAX --------
    if (sql.includes("max(")) {

        let field = sql.includes("premium") ? "Premium" : "Amount";

        let max = Math.max(...data.map(d => d[field]));

        output.innerHTML = `<p><b>Maximum Value:</b> ${max}</p>`;
        return;
    }

    // -------- EMPTY RESULT --------
    if (!data || data.length === 0) {
        output.innerHTML = "<p style='color:red;'>0 Rows Found</p>";
        return;
    }

    // -------- BUILD TABLE --------
    let html = `<table><thead><tr>`;

    Object.keys(data[0]).forEach(key => html += `<th>${key}</th>`);

    html += `</tr></thead><tbody>`;

    data.forEach(row => {
        html += `<tr>`;
        Object.values(row).forEach(val => html += `<td>${val}</td>`);
        html += `</tr>`;
    });

    html += `</tbody></table>`;

    output.innerHTML = html;
}
