<!DOCTYPE html>
<html>
<head>
<title>Notifications</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#f4f6f9;
}

header{
    background:#2c3e50;
    color:white;
    padding:15px;
    text-align:center;
}

.container{
    width:80%;
    margin:30px auto;
}

.note{
    background:white;
    padding:15px;
    margin:15px 0;
    border-left:6px solid #3498db;
    border-radius:6px;
    box-shadow:0 0 8px rgba(0,0,0,0.1);
}

.approved{
    border-left-color:green;
}

.pending{
    border-left-color:orange;
}

</style>
</head>

<body>

<header>
    <h2>Notifications</h2>
</header>

<div class="container" id="notifications">
</div>

<script>

let claims = JSON.parse(localStorage.getItem("claims")) || [];
let container = document.getElementById("notifications");

if(claims.length === 0){
    container.innerHTML = "<h3>No notifications yet.</h3>";
}else{

    claims.forEach(c => {

        let div = document.createElement("div");
        div.className = "note";

        if(c.status === "Pending"){
            div.classList.add("pending");
            div.innerHTML = `Your claim for <b>${c.policy}</b> is under review.`;
        }
        else if(c.status === "Approved"){
            div.classList.add("approved");
            div.innerHTML = `✅ Your claim for <b>${c.policy}</b> has been approved.`;
        }
        else if(c.status === "Rejected"){
            div.classList.add("pending");
            div.innerHTML = `❌ Your claim for <b>${c.policy}</b> was rejected.`;
        }

        container.appendChild(div);

    });

}

</script>

</body>
</html>
